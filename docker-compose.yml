services:
  postgres:
    image: postgres:16-alpine
    container_name: kak_fit_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kak_fit
    volumes:
      - kak_fit_pgdata:/var/lib/postgresql/data

volumes:
  kak_fit_pgdata:
